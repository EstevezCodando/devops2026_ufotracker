apiVersion: v1
kind: Namespace
metadata:
  name: ufology

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-postgres
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ufology-postgres
  template:
    metadata:
      labels:
        app: ufology-postgres
    spec:
      containers:
        - name: postgres
          image: leogloriainfnet/ufodb:1.0-win
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "devops2025!"
            - name: POSTGRES_DB
              value: "ufology"

---
apiVersion: v1
kind: Service
metadata:
  name: ufology-postgres-service
  namespace: ufology
spec:
  type: ClusterIP
  selector:
    app: ufology-postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-redis
  namespace: ufology
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ufology-redis
  template:
    metadata:
      labels:
        app: ufology-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: ufology-redis-service
  namespace: ufology
spec:
  type: ClusterIP
  selector:
    app: ufology-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
