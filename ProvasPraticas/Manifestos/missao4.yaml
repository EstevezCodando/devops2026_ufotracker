apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ufology
data:
  DB_NAME: "ufology"
  DB_HOST: "ufology-postgres-service"
  DB_PORT: "5432"
  DB_USER: "postgres"
  REDIS_HOST: "ufology-redis-service"
  REDIS_PORT: "6379"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: ufology
type: Opaque
stringData:
  DB_PASSWORD: "devops2025!"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ufology-app
  namespace: ufology
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ufology-app
  template:
    metadata:
      labels:
        app: ufology-app
    spec:
      containers:
        - name: ufology-app
          image: estevezcodandosoft/ufotracker:1.0
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: DB_PASSWORD
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://ufology-postgres-service:5432/ufology"
            - name: SPRING_DATA_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_HOST
            - name: SPRING_DATA_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: REDIS_PORT
            - name: SPRING_CACHE_TYPE
              value: "redis"

---
apiVersion: v1
kind: Service
metadata:
  name: ufology-app-service
  namespace: ufology
spec:
  type: ClusterIP
  selector:
    app: ufology-app
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
